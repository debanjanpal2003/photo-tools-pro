name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Bypass the June 16 Node 24 deprecation errors
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: |
          npm install
          npm install -g @capacitor/cli

      - name: Fresh Environment Setup
        # Forcefully remove everything to prevent conflicts
        run: |
          rm -rf android
          rm -rf www
          mkdir -p www
          # Copy any HTML file to www/index.html (safely handles & and spaces)
          find . -maxdepth 1 -name "*.html" -exec cp {} www/index.html \;
          ls -la www/

      - name: Create Android Project
        run: |
          npx cap add android
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: photo-tools-pro-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
