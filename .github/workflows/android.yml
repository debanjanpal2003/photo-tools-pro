name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Force Node 24 to comply with the June 16, 2026 GitHub deadline
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: |
          npm install
          npm install -g @capacitor/cli

      - name: Clean Environment
        # This is the "Proper Fix": We remove old folders that might be broken
        run: |
          rm -rf android
          rm -rf www
          mkdir -p www

      - name: Prepare Web Assets
        run: |
          # Use single quotes to safely handle the & and spaces in your filename
          cp 'image to pdf & image resizer.html' www/index.html
          ls -la www/

      - name: Build Android Project
        run: |
          # Re-create the android folder from scratch for a perfect build
          npx cap add android
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: photo-tools-pro-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
