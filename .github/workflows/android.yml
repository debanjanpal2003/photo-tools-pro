name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Use the official GitHub variable for the Node 24 transition
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Total Environment Reset
        # This removes all local conflicts and broken folders
        run: |
          rm -rf android
          rm -rf www
          rm -rf node_modules
          mkdir -p www

      - name: Install Project Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/android @capacitor/filesystem @capacitor/share
          npm install -D @capacitor/cli

      - name: Prepare Assets
        run: |
          # Robust copy using wildcard to handle any filename
          cp *.html www/index.html || echo "HTML file not found"
          ls -la www/

      - name: Rebuild Native Project
        run: |
          npx cap add android
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: photo-tools-pro-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
