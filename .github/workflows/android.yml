name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  # This is the single correct variable for the June 16 transition
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: |
          set -x
          npm install
          npm install -g @capacitor/cli

      - name: Fresh Environment Setup
        run: |
          set -x
          # Remove any old/broken folders
          rm -rf android
          rm -rf www
          mkdir -p www
          # Copy your specific HTML file safely
          cp 'image to pdf & image resizer.html' www/index.html
          ls -la www/

      - name: Create Android Project
        run: |
          set -x
          npx cap add android
          npx cap sync android

      - name: Build APK
        run: |
          set -x
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: photo-tools-pro-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
